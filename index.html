<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 삼진 & K - 건설현장 플랫폼 </title>
    
    <link rel="icon" type="image/png" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* 세련된 폰트 (Pretendard) 적용 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #050505; /* 깊이감 있는 어두운 배경 */
            color: #ffffff;
            overflow: hidden; /* 배경 장식 요소로 인한 스크롤 방지 */
        }

        /* 둥둥 떠다니는 애니메이션 설정 */
        .float-anim {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-25px); } /* 위로 25px 이동 */
            100% { transform: translateY(0px); }
        }

        /* 고급스러운 그림자 효과 */
        .glow-shadow {
            box-shadow: 0 30px 60px -15px rgba(255, 180, 0, 0.15),
                        0 20px 40px -20px rgba(50, 205, 50, 0.1);
        }

        /* 배경에 은은하게 퍼지는 색상 (블러 효과) */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
        }
        .blob-1 {
            top: -20%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255,180,0,0.2) 0%, rgba(0,0,0,0) 70%);
        }
        .blob-2 {
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(50,205,50,0.15) 0%, rgba(0,0,0,0) 70%);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative selection:bg-yellow-500 selection:text-black">
    
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <main class="text-center flex flex-col items-center z-10 w-full max-w-5xl px-6">
        
        <div class="float-anim mb-14">
            <div class="relative group cursor-pointer">
                <div class="absolute -inset-1 bg-gradient-to-r from-yellow-500 to-green-500 rounded-[2.5rem] blur opacity-25 group-hover:opacity-45 transition duration-1000 group-hover:duration-300"></div>
                
                <img
                    src="icon.png"
                    onerror="this.onerror=null; this.src='icon.jpg';"
                    alt="SAJIN Hub HOME UI"
                    class="relative rounded-[2rem] w-full max-w-md md:max-w-xl lg:max-w-2xl object-contain shadow-2xl glow-shadow border border-gray-800/60 transition-transform duration-500 group-hover:scale-[1.02]"
                >
            </div>
        </div>

        <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight mb-5 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-green-400 drop-shadow-sm">
            현장 소통의 새로운 기준
        </h1>
        <p class="text-gray-400 text-lg md:text-xl font-medium max-w-2xl mx-auto mb-10 leading-relaxed">
            여러 건설 현장 업무 공유를 하나의 앱으로 스마트하게.<br class="hidden md:block"/>
            'SAMJIN Hub v2.6' 효율적인 업무를 경험하세요.
        </p>

        <a href="https://github.com/account894/samjin_app_down/releases/download/v1.0.0/field-comm-app_0.1.0_x64-setup.exe" download>
            <button class="px-10 py-4 bg-white text-black rounded-full font-bold text-lg md:text-xl transition-all duration-300 hover:scale-105 hover:bg-yellow-50 shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:shadow-[0_0_30px_rgba(255,255,255,0.4)] cursor-pointer">
                앱 다운로드
            </button>
        </a>
        
    </main>
</body>
</html>
